# pocketfox - a small, yet clever agent
# Docker Compose configuration
# 
# Usage:
#   docker compose up -d
#

services:
  agent:
    image: pocketfox:latest
    container_name: ${PF_AGENT_NAME:-pocketfox}
    hostname: ${PF_AGENT_NAME:-pocketfox}
    restart: unless-stopped
    build:
      context: .
      ssh:
        - default
      args:
        AGENT_NAME: ${PF_AGENT_NAME:-pocketfox}
        CACHE_BUST: ${CACHE_BUST:-0}
        TZ: ${TZ:-UTC}

    environment:
      # Timezone — inherited from host env or .env, defaults to UTC
      - TZ=${TZ:-UTC}

    env_file:
      - .env
      - .env.local  # overrides

    volumes:
      - ${HOME}/persistence-local/workspace:/home/${PF_AGENT_NAME}/workspace
      - ${HOME}/persistence-local/avatars:/home/${PF_AGENT_NAME}/workspace/avatars
      - ${HOME}/projects:/home/${PF_AGENT_NAME}/workspace/projects
      - ${HOME}/persistence-local/config:/home/${PF_AGENT_NAME}/.config
      - ${HOME}/persistence-local/claude_auth:/home/${PF_AGENT_NAME}/.claude
      - ${HOME}/.ssh:/home/${PF_AGENT_NAME}/.ssh

    ports:
      - "18790:18790"

    # Run as non-root user (set via USER directive in Dockerfile)
    secrets:
      - passwd

  # Browserless - Headless Chrome for web automation & OAuth
  browserless:
    image: ghcr.io/browserless/chromium:v2.39.0
    container_name: browserless
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Only localhost
    environment:
      - CONCURRENT=1
      - TOKEN=${BROWSERLESS_TOKEN:-}
      - DATA_DIR=/data
      - TIMEOUT=300000
    volumes:
      - ${HOME}/persistence-local/browserless-data:/data  # bind mount instead of named volume
    tmpfs:
      - /tmp

  # Signal CLI REST API - Signal Messenger integration
  signal-cli:
    image: bbernhard/signal-cli-rest-api:0.97
    container_name: signal-cli
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"  # Only localhost
    environment:
      - MODE=json-rpc  # better polling response time
    volumes:
      - ${HOME}/persistence-local/signal-cli-data:/home/.local/share/signal-cli

secrets:
  passwd:
    file: ${HOME}/.pocketfox_passwd
