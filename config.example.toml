# pocketfox configuration
# Copy to ~/.config/pocketfox-<name>/config.toml and fill in your API keys.
# The agent name is set via PF_AGENT_NAME env var (default: "pocketfox").
# Docs: https://github.com/outfox/pocketfox

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
api_base = "https://openrouter.ai/api/v1"

[providers.anthropic]
api_key = "${ANTHROPIC_API_KEY}"

[providers.groq]
api_key = "${GROQ_API_KEY}"

[agents.defaults]
model = "openrouter/anthropic/claude-sonnet-4-5"
# context_files = ["AGENTS.md", "TOOLS.md"]  # Workspace files loaded into system prompt

# Per-context overrides for heartbeat and cron (context_files = None inherits from defaults)
# [agents.heartbeat]
# context_files = ["AGENTS.md"]
#
# [agents.cron]
# context_files = ["AGENTS.md", "TOOLS.md"]

[tools]
restrict_to_workspace = true

[tools.web.search]
api_key = "${BRAVE_API_KEY}"

[channels.telegram]
enabled = true
token = "${TELEGRAM_BOT_TOKEN}"
allow_from = ["${TELEGRAM_ALLOW_FROM}"] # Telegram IDs
# context_files = ["AGENTS.md", "SOUL.md", "USER.md", "TOOLS.md", "MEMORY.md"]  # Override defaults

[channels.signal]
enabled = true
api_url = "${SIGNAL_CLI_URL}"
phone_number = "${SIGNAL_PHONE_NUMBER}"
allow_from = ["${SIGNAL_ALLOW_FROM}"] # Phone Numbers
