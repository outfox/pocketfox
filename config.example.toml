# pocketfox configuration
# Copy to ~/.config/pocketfox-<name>/config.toml and fill in your API keys.
# The agent name is set via PF_AGENT_NAME env var (default: "pocketfox").
# Docs: https://github.com/outfox/pocketfox

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
api_base = "https://openrouter.ai/api/v1"

[providers.anthropic]
api_key = "${ANTHROPIC_API_KEY}"

[providers.groq]
api_key = "${GROQ_API_KEY}"

[agents.defaults]
model = "openrouter/anthropic/claude-sonnet-4-5"
# context_files = ["AGENTS.md", "TOOLS.md"]  # Default files for synthesized context

[tools]
restrict_to_workspace = true

[tools.web.search]
api_key = "${BRAVE_API_KEY}"

# Channels: connection + security only
[channels.telegram]
enabled = true
token = "${TELEGRAM_BOT_TOKEN}"
allow_from = ["${TELEGRAM_ALLOW_FROM}"]

[channels.signal]
enabled = true
api_url = "${SIGNAL_CLI_URL}"
phone_number = "${SIGNAL_PHONE_NUMBER}"
allow_from = ["${SIGNAL_ALLOW_FROM}"]

# Contexts: the primary routing unit
# If no [contexts.*] sections exist, a "default" context is auto-synthesized
# from agents.defaults.context_files + all enabled channels as wildcard I/O.

